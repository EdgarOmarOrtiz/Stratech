<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stratech Consulting</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }
  
  html, body {
    overflow-x: hidden !important;
    width: 100%;
    background: #020617 !important;
  }

  * {
    box-sizing: border-box;
  }

  body {
    color: #f8fafc;
  }

  /* Responsive safety fixes */
  section, header, footer, nav, main, div {
    max-width: 100%;
  }

  img, svg, video {
    max-width: 100%;
    height: auto;
  }

  .container, .max-w-7xl, .max-w-6xl, .max-w-5xl, .max-w-4xl {
    width: min(100% - 2rem, 1280px) !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }

  @media (max-width: 768px) {
    h1 {
      font-size: clamp(2.4rem, 12vw, 4.25rem) !important;
      line-height: 1.02 !important;
    }

    h2 {
      font-size: clamp(2rem, 9vw, 3.25rem) !important;
      line-height: 1.08 !important;
    }

    p {
      line-height: 1.65 !important;
    }

    .grid {
      gap: 1.25rem !important;
    }

    .px-8, .px-10, .px-12 {
      padding-left: 1.25rem !important;
      padding-right: 1.25rem !important;
    }

    .py-24, .py-32 {
      padding-top: 4rem !important;
      padding-bottom: 4rem !important;
    }
  }

  /* Navigation logo */
  .stratech-nav-logo {
    width: 230px !important;
    max-width: 52vw !important;
    height: auto !important;
    object-fit: contain !important;
    display: block !important;
    filter: none;
  }

  .stratech-nav-brand {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
    margin-right: auto !important;
    flex-shrink: 0 !important;
  }

  nav {
    display: flex !important;
    align-items: center !important;
  }

  nav > div:first-child,
  header > div:first-child {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    gap: 1rem !important;
    width: 100% !important;
  }

  @media (max-width: 768px) {
    .stratech-nav-logo {
      width: 185px !important;
      max-width: 58vw !important;
    }
  }

  /* Hero logo */
  .stratech-hero-logo {
    width: min(620px, 88vw) !important;
    margin: 0 auto 2rem auto !important;
    display: block !important;
    filter: drop-shadow(0 0 40px rgba(37, 99, 235, 0.42));
  }


  .stratech-logo-wrap {
    background: transparent !important;
    box-shadow: none !important;
    border: none !important;
    padding: 0 !important;
  }

  .stratech-email-button {
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.65rem !important;
    border-radius: 999px !important;
    color: white !important;
    font-weight: 800 !important;
    letter-spacing: .04em;
    background: linear-gradient(135deg, #0ea5e9, #2563eb) !important;
    box-shadow: 0 0 35px rgba(37, 99, 235, .45) !important;
    border: 1px solid rgba(147, 197, 253, .35) !important;
    text-decoration: none !important;
  }

  .from-pr-section {
    position: relative;
    overflow: hidden;
    padding: 5rem 1.25rem;
    background:
      radial-gradient(circle at 50% 50%, rgba(37, 99, 235, .16), transparent 38%),
      linear-gradient(180deg, #020617, #030712);
    border-top: 1px solid rgba(59, 130, 246, .18);
    border-bottom: 1px solid rgba(59, 130, 246, .18);
    text-align: center;
  }

  .from-pr-section h2 {
    font-size: clamp(2.4rem, 8vw, 5rem);
    line-height: 1;
    margin: 0;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #fff;
  }

  .from-pr-section span {
    color: #3b82f6;
  }

  .from-pr-section p {
    margin: 1rem auto 0;
    max-width: 720px;
    color: #cbd5e1;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
  }

  .stratech-expertise-section {
    position: relative;
    overflow: hidden;
    padding: 5rem 1.25rem;
    background:
      radial-gradient(circle at 50% 0%, rgba(37, 99, 235, .18), transparent 34%),
      linear-gradient(180deg, #020617 0%, #030712 100%);
    border-top: 1px solid rgba(59, 130, 246, .16);
    border-bottom: 1px solid rgba(59, 130, 246, .16);
  }

  .stratech-expertise-container {
    width: min(100% - 2rem, 1180px);
    margin: 0 auto;
  }

  .stratech-expertise-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .stratech-expertise-header h2 {
    font-size: clamp(2rem, 6vw, 4rem);
    line-height: 1.05;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #ffffff;
    margin: 0;
  }

  .stratech-expertise-header h2 span {
    color: #3b82f6;
  }

  .stratech-expertise-header p {
    color: #cbd5e1;
    font-size: clamp(1rem, 2.2vw, 1.2rem);
    max-width: 760px;
    margin: 1rem auto 0;
    line-height: 1.7;
  }

  .stratech-expertise-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.25rem;
  }

  .stratech-expertise-card {
    background:
      linear-gradient(180deg, rgba(15, 23, 42, .86), rgba(2, 6, 23, .92));
    border: 1px solid rgba(59, 130, 246, .22);
    border-radius: 1.5rem;
    padding: 2rem;
    box-shadow: 0 0 50px rgba(37, 99, 235, .12);
    min-height: 250px;
  }

  .stratech-expertise-card .icon {
    width: 54px;
    height: 54px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    background: rgba(37, 99, 235, .14);
    border: 1px solid rgba(96, 165, 250, .26);
    color: #60a5fa;
    font-size: 1.7rem;
    margin-bottom: 1.35rem;
  }

  .stratech-expertise-card h3 {
    color: #ffffff;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    line-height: 1;
    font-weight: 900;
    margin: 0 0 .7rem 0;
  }

  .stratech-expertise-card h4 {
    color: #60a5fa;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin: 0 0 1rem 0;
  }

  .stratech-expertise-card p {
    color: #cbd5e1;
    line-height: 1.65;
    margin: 0;
  }

  @media (max-width: 900px) {
    .stratech-expertise-grid {
      grid-template-columns: 1fr;
    }

    .stratech-expertise-card {
      min-height: auto;
    }
  }


  nav img,
  footer img {
    background: transparent !important;
    mix-blend-mode: normal !important;
    box-shadow: none !important;
    border: 0 !important;
    object-fit: contain !important;
    image-rendering: auto !important;
    filter: none !important;
  }

  nav img {
    width: 230px !important;
    height: auto !important;
    max-width: 52vw !important;
  }

  footer img {
    width: 230px !important;
    height: auto !important;
    max-width: 52vw !important;
  }

  @media (max-width: 768px) {
    nav img,
    footer img {
      width: 185px !important;
      height: auto !important;
      max-width: 58vw !important;
    }
  }
</style>


</head>

<script>
  window.addEventListener('load', function () {
    setTimeout(function () {
      const root = document.getElementById('root');
      if (!root) return;

      // Keep navbar and footer logos identical.
      const footerLogo = root.querySelector('footer img');
      const navLogo = root.querySelector('nav img');
      const sharedLogoSrc = (footerLogo && footerLogo.src) || (navLogo && navLogo.src);

      [navLogo, footerLogo].forEach(function (img) {
        if (!img || !sharedLogoSrc) return;
        img.src = sharedLogoSrc;
        img.alt = 'Stratech Consulting';
        img.style.background = 'transparent';
        img.style.mixBlendMode = 'normal';
        img.style.objectFit = 'contain';
        img.style.width = '230px';
        img.style.maxWidth = '52vw';
        img.style.height = 'auto';
        img.style.filter = 'none';
      });

      // Ensure contact buttons open email.
      root.querySelectorAll('a').forEach(function(a) {
        if (/email|contact|message|send/i.test(a.textContent || '') || (a.href || '').startsWith('mailto:')) {
          a.href = 'mailto:contact@stratech.consulting?subject=Consulting Inquiry';
          a.classList.add('stratech-email-button');
          if (/send|contact|message|email/i.test(a.textContent || '')) {
            a.textContent = 'EMAIL US';
          }
        }
      });

      // Add "From Puerto Rico" section before footer or at the end.
      if (!root.querySelector('.from-pr-section')) {
        const pr = document.createElement('section');
        pr.className = 'from-pr-section';
        pr.innerHTML = '<h2>From <span>Puerto Rico</span></h2><p>Built from Puerto Rico to help businesses simplify operations, automate smarter, and grow with clarity.</p>';
        const footerEl = root.querySelector('footer');
        if (footerEl && footerEl.parentElement) {
          footerEl.parentElement.insertBefore(pr, footerEl);
        } else {
          root.appendChild(pr);
        }
      }
    }, 500);
  });
</script>
